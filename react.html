<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 3 - React</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <a href="index.html" class="volver">Volver al Inicio</a>
    <h2>Ejercicio 3: Formulario con React</h2>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [personas, setPersonas] = useState([]);
            const [form, setForm] = useState({ nombre: '', apellido: '', edad: '', altura: '', peso: '' });

            const handleChange = (e) => {
                setForm({ ...form, [e.target.name]: e.target.value });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const imcCalculado = (parseFloat(form.peso) / Math.pow(parseFloat(form.altura), 2)).toFixed(2);
                
                const nuevaPersona = {
                    ...form,
                    imc: imcCalculado,
                    id: Date.now()
                };

                setPersonas([...personas, nuevaPersona]);
                setForm({ nombre: '', apellido: '', edad: '', altura: '', peso: '' });
            };

            const eliminarPersona = (id) => {
                setPersonas(personas.filter(p => p.id !== id));
            };

            return (
                <div>
                    <form onSubmit={handleSubmit}>
                        <input name="nombre" value={form.nombre} onChange={handleChange} placeholder="Nombre" required />
                        <input name="apellido" value={form.apellido} onChange={handleChange} placeholder="Apellido" required />
                        <input name="edad" type="number" value={form.edad} onChange={handleChange} placeholder="Edad" required />
                        <input name="altura" type="number" step="0.01" value={form.altura} onChange={handleChange} placeholder="Altura en metros ej 1.75" required />
                        <input name="peso" type="number" step="0.1" value={form.peso} onChange={handleChange} placeholder="Peso en kg ej 70" required />
                        <button type="submit">Agregar Persona</button>
                    </form>

                    <table>
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Apellido</th>
                                <th>Edad</th>
                                <th>Altura</th>
                                <th>Peso</th>
                                <th>IMC</th>
                                <th>Accion</th>
                            </tr>
                        </thead>
                        <tbody>
                            {personas.map((p) => (
                                <tr key={p.id}>
                                    <td>{p.nombre}</td>
                                    <td>{p.apellido}</td>
                                    <td>{p.edad}</td>
                                    <td>{p.altura} m</td>
                                    <td>{p.peso} kg</td>
                                    <td><strong>{p.imc}</strong></td>
                                    <td><button className="btn-eliminar" onClick={() => eliminarPersona(p.id)}>Quitar</button></td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
