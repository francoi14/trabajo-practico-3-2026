<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2 - Personas</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="people-page">
    <a href="index.html" class="volver">Volver al Inicio</a>
    <h2>Ejercicio 2: Formulario y Tabla de Personas</h2>

    <form id="form-persona">
        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="text" id="apellido" placeholder="Apellido" required>
        <input type="number" id="edad" placeholder="Edad" required>
        <input type="number" step="0.01" id="altura" placeholder="Altura en metros ej 1.75" required>
        <input type="number" step="0.1" id="peso" placeholder="Peso en kg ej 70" required>
        <button type="submit">Agregar Persona</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Edad</th>
                <th>Altura</th>
                <th>Peso</th>
                <th>IMC</th>
                <th>Accion</th>
            </tr>
        </thead>
        <tbody id="tabla-body">
        </tbody>
    </table>

    <script src="js/personas.js"></script>
</body>
</html>
